services:
  api:
    build: .
    # container_name: compose-watch-example-api
    ports:
      - "8080:8080"
    env_file:
      - .env.api
    volumes:
      - api_data:/data
    networks:
      - go-app-network
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 1
      start_period: 40s
    develop:
      watch:
        - path: ./
          target: /app
          action: rebuild
          ignore:
            - "**/*.md"
    # profiles:
    #   - dev
    restart: unless-stopped
    user: "1001:1001"       # Non-root user, References UID:GID from Dockerfile

  db:
    image: postgres:15-alpine     # Specific version + Alpine for security
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 2
    ports:
      - "127.0.0.1:5432:5432"  # Binded to localhost only; external / Internet: blocked
    env_file:
      - .env.db
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - go-app-network

  nginx:
    image: nginx:1.24-alpine
    ports:
      - "80:80"
    restart: unless-stopped
    networks:
      - go-app-network
    depends_on:
      - api

volumes:
  api_data:
    driver: local
  postgres_data:
    driver: local
    # driver: rexray/ebs

networks:
  go-app-network:
    driver: bridge
